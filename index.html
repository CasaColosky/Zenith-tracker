<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ZENITH · Field Tracker</title>
<style>
  :root{
    --bg:#07090c; --ink:#e8f0f2; --dim:#6b7780;
    --accent:#c8ff32; --accent2:#19e0ff; --warn:#ff5d4a;
    --panel:rgba(10,14,18,.82); --line:rgba(200,255,50,.18);
    --mono:ui-monospace,"SF Mono","Cascadia Mono","Roboto Mono",Menlo,Consolas,monospace;
    --sans:"Helvetica Neue",Arial,system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:var(--bg);color:var(--ink);font-family:var(--sans);overflow:hidden;overscroll-behavior:none}
  #stage{position:fixed;inset:0}
  canvas#view{position:absolute;inset:0;width:100%;height:100%;touch-action:none;display:block}
  video{display:none}

  .topbar{position:absolute;top:0;left:0;right:0;z-index:5;display:flex;align-items:center;
    justify-content:space-between;padding:max(14px,env(safe-area-inset-top)) 16px 12px;
    background:linear-gradient(180deg,rgba(7,9,12,.85),rgba(7,9,12,0));pointer-events:none}
  .brand{font-family:var(--mono);font-weight:700;letter-spacing:.32em;font-size:13px}
  .brand b{color:var(--accent)}
  .tags{display:flex;gap:6px;align-items:center}
  .mode{font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--dim);
    border:1px solid var(--line);padding:5px 9px;border-radius:2px;text-transform:uppercase}
  .mode.live{color:var(--accent);border-color:var(--accent);box-shadow:0 0 14px -4px var(--accent)}
  .mode.rec{color:#fff;border-color:var(--warn);background:rgba(255,93,74,.18)}
  .mode.rec::before{content:"●";color:var(--warn);margin-right:5px;animation:blink 1s infinite}
  @keyframes blink{50%{opacity:.25}}

  .hud{position:absolute;left:14px;top:64px;z-index:5;pointer-events:none;display:flex;flex-direction:column;gap:10px}
  .readout{font-family:var(--mono);background:var(--panel);backdrop-filter:blur(6px);
    border-left:2px solid var(--accent);padding:7px 12px;min-width:138px}
  .readout .lbl{font-size:9px;letter-spacing:.24em;color:var(--dim);text-transform:uppercase}
  .readout .val{font-size:27px;font-weight:700;line-height:1.05;font-variant-numeric:tabular-nums}
  .readout .unit{font-size:11px;color:var(--accent);letter-spacing:.1em}
  .readout.alt{border-color:var(--accent2)}.readout.alt .unit{color:var(--accent2)}
  .mini{display:flex;gap:8px;flex-wrap:wrap}
  .mini .readout{min-width:0;padding:5px 10px}.mini .val{font-size:15px}

  .dock{position:absolute;left:0;right:0;bottom:0;z-index:6;
    padding:12px 14px max(16px,env(safe-area-inset-bottom));
    background:linear-gradient(0deg,rgba(7,9,12,.93),rgba(7,9,12,0))}
  .row{display:flex;gap:8px;margin-top:8px}
  .btn{flex:1;font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    background:rgba(255,255,255,.04);color:var(--ink);border:1px solid rgba(255,255,255,.14);
    border-radius:3px;padding:13px 6px;cursor:pointer;transition:.15s;user-select:none}
  .btn:active{transform:scale(.97)}
  .btn.on{background:var(--accent);color:#08130a;border-color:var(--accent);font-weight:700;box-shadow:0 0 20px -6px var(--accent)}
  .btn.rec{background:var(--warn);color:#fff;border-color:var(--warn);font-weight:700}
  .btn.go{background:var(--accent);color:#08130a;border-color:var(--accent);font-weight:700}
  .btn.warn{border-color:rgba(255,93,74,.4);color:var(--warn)}
  .seg{display:flex;border:1px solid rgba(255,255,255,.14);border-radius:3px;overflow:hidden;flex:1}
  .seg .btn{border:0;border-radius:0}.seg .btn+.btn{border-left:1px solid rgba(255,255,255,.14)}
  .sens{display:flex;align-items:center;gap:10px;margin-top:10px;font-family:var(--mono);
    font-size:9px;letter-spacing:.18em;color:var(--dim);text-transform:uppercase}
  input[type=range]{flex:1;accent-color:var(--accent);height:22px}

  .plays{position:absolute;right:14px;top:64px;z-index:6;width:174px;max-height:46vh;overflow:auto;
    background:var(--panel);backdrop-filter:blur(6px);border:1px solid var(--line);border-radius:4px;
    padding:10px;display:none;font-family:var(--mono)}
  .plays.show{display:block}
  .plays h4{font-size:9px;letter-spacing:.24em;color:var(--accent);text-transform:uppercase;margin-bottom:8px}
  .pl{border-top:1px solid rgba(255,255,255,.08);padding:7px 0;font-size:10px;color:var(--dim)}
  .pl b{color:var(--ink);font-size:15px;font-weight:700}
  .pl span{color:var(--accent2)}
  .plays .empty{font-size:10px;color:var(--dim);letter-spacing:.1em}

  .hint{position:absolute;left:50%;top:54%;transform:translate(-50%,-50%);z-index:7;
    font-family:var(--mono);font-size:12px;letter-spacing:.1em;text-align:center;color:var(--ink);
    background:var(--panel);border:1px solid var(--line);padding:14px 20px;border-radius:4px;
    max-width:82%;line-height:1.6;pointer-events:none;opacity:0;transition:opacity .25s}
  .hint.show{opacity:1}.hint .k{color:var(--accent)}

  .gate{position:absolute;inset:0;z-index:20;background:radial-gradient(120% 90% at 50% 16%,#0e1620,#05070a 70%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px}
  .gate h1{font-family:var(--mono);font-size:36px;letter-spacing:.3em;font-weight:800}
  .gate h1 b{color:var(--accent)}
  .gate p{color:var(--dim);font-size:13px;line-height:1.7;max-width:350px;margin:16px 0 26px;font-family:var(--mono);letter-spacing:.03em}
  .gate .start{font-family:var(--mono);font-size:14px;letter-spacing:.2em;text-transform:uppercase;
    background:var(--accent);color:#08130a;font-weight:800;border:0;border-radius:4px;padding:18px 40px;cursor:pointer;box-shadow:0 0 40px -10px var(--accent)}
  .gate .start:disabled{opacity:.5}
  .gate .status{color:var(--accent2);font-size:11px;margin-top:18px;font-family:var(--mono);letter-spacing:.12em;min-height:16px}
  .gate .err{color:var(--warn);font-size:12px;margin-top:14px;max-width:330px;line-height:1.6;font-family:var(--mono)}
  .scan{position:absolute;inset:0;pointer-events:none;opacity:.5;mix-blend-mode:overlay;
    background:repeating-linear-gradient(0deg,transparent 0 3px,rgba(255,255,255,.03) 3px 4px)}
  .spin{display:inline-block;width:12px;height:12px;border:2px solid var(--accent2);border-top-color:transparent;
    border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:8px}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="stage">
  <video id="cam" playsinline muted></video>
  <canvas id="view"></canvas>
  <div class="scan"></div>

  <div class="topbar">
    <div class="brand">ZENITH<b>·</b>TRACKER</div>
    <div class="tags">
      <div class="mode" id="recTag" style="display:none">REC</div>
      <div class="mode" id="modeTag">STANDBY</div>
    </div>
  </div>

  <div class="hud">
    <div class="readout"><div class="lbl">Speed</div>
      <div><span class="val" id="spd">0.0</span> <span class="unit" id="spdUnit">KM/H</span></div></div>
    <div class="mini">
      <div class="readout alt"><div class="lbl">Play Peak</div><span class="val" id="peak">0.0</span></div>
      <div class="readout alt"><div class="lbl">Max</div><span class="val" id="mx">0.0</span></div>
    </div>
    <div class="mini">
      <div class="readout"><div class="lbl">Dist m</div><span class="val" id="dist">0</span></div>
      <div class="readout"><div class="lbl">Time s</div><span class="val" id="clk">0.0</span></div>
    </div>
  </div>

  <div class="plays" id="playsPanel"><h4>Play Log</h4><div id="playList" class="empty">No plays yet</div></div>

  <div class="hint" id="hint"></div>

  <div class="dock">
    <div class="seg">
      <button class="btn on" id="mPlayer">Players</button>
      <button class="btn" id="mBall">Ball</button>
    </div>
    <div class="row">
      <button class="btn rec" id="bRec">● Rec Play</button>
      <button class="btn go" id="bCal">Set Scale</button>
    </div>
    <div class="row">
      <button class="btn on" id="bTrail">Trail</button>
      <button class="btn" id="bHeat">Heatmap</button>
      <button class="btn" id="bUnit">KM/H</button>
    </div>
    <div class="row">
      <button class="btn" id="bLog">Log</button>
      <button class="btn warn" id="bReset">Reset</button>
    </div>
    <div class="sens"><span>Detect&nbsp;conf</span>
      <input type="range" id="sens" min="20" max="75" value="42">
    </div>
  </div>

  <div class="gate" id="gate">
    <div class="scan"></div>
    <h1>ZENITH<b>.</b></h1>
    <p>AI field tracker. Tap a detected player or the ball to lock on — it follows automatically and reads speed, position, trail and per-play peaks.</p>
    <button class="start" id="startBtn">Start</button>
    <div class="status" id="gateStatus"></div>
    <div class="err" id="gateErr"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<script>
const video=document.getElementById('cam');
const cv=document.getElementById('view');
const ctx=cv.getContext('2d');
const det=document.createElement('canvas');
const dctx=det.getContext('2d');
const DETW=320; let DETH=240;

let DPR=Math.min(window.devicePixelRatio||1,2);
let CW=0,CH=0, cover={dx:0,dy:0,dw:0,dh:0};
let model=null;

const S={
  running:false, mode:'player', conf:0.42,
  target:null, lost:0, searching:false, dets:[],
  calStage:0, calPts:[], ppm:null,
  lastT:0, startT:0, maxV:0, distM:0, smoothV:0, unit:'kmh',
  trail:[], showTrail:true, showHeat:false, heat:null, HX:48, HY:0,
  recording:false, peakV:0, playDist:0, playStart:0, plays:[]
};
const COCO_CLASS=()=>S.mode==='ball'?'sports ball':'person';

function loadPlays(){try{const j=localStorage.getItem('zenith_plays');if(j)S.plays=JSON.parse(j);}catch(e){}}
function savePlays(){try{localStorage.setItem('zenith_plays',JSON.stringify(S.plays.slice(0,30)));}catch(e){}}

function resize(){
  CW=Math.round(innerWidth*DPR);CH=Math.round(innerHeight*DPR);
  cv.width=CW;cv.height=CH;
  DETH=Math.round(DETW*CH/CW);det.width=DETW;det.height=DETH;
  S.HY=Math.round(S.HX*CH/CW);S.heat=new Float32Array(S.HX*S.HY);
  computeCover();
}
function computeCover(){
  if(!video.videoWidth)return;
  const vw=video.videoWidth,vh=video.videoHeight,s=Math.max(CW/vw,CH/vh);
  cover.dw=vw*s;cover.dh=vh*s;cover.dx=(CW-cover.dw)/2;cover.dy=(CH-cover.dh)/2;
}
addEventListener('resize',resize);

document.getElementById('startBtn').onclick=boot;
async function boot(){
  const btn=document.getElementById('startBtn'),st=document.getElementById('gateStatus'),er=document.getElementById('gateErr');
  er.textContent='';btn.disabled=true;
  try{
    st.innerHTML='<span class="spin"></span>Requesting camera…';
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false});
    video.srcObject=stream;await video.play();
    await new Promise(r=>{video.videoWidth?r():video.onloadedmetadata=r;});
    resize();
    st.innerHTML='<span class="spin"></span>Loading vision model… (first load downloads ~6MB)';
    model=await cocoSsd.load({base:'lite_mobilenet_v2'});
    document.getElementById('gate').style.display='none';
    S.running=true;loadPlays();renderPlays();
    flash('Tap a detected <span class="k">'+(S.mode==='ball'?'ball':'player')+'</span> to lock on',2800);
    requestAnimationFrame(loop);detectLoop();
  }catch(e){
    btn.disabled=false;st.textContent='';
    er.textContent='Could not start: '+(e.name||e.message)+'. Allow camera access and run over https. If embedded, open the page in a full browser / on your own domain so the camera + model CDN are reachable.';
  }
}

async function detectLoop(){
  while(S.running){
    if(model&&video.readyState>=2){
      dctx.drawImage(video,cover.dx*DETW/CW,cover.dy*DETH/CH,cover.dw*DETW/CW,cover.dh*DETH/CH);
      let preds=[];
      try{preds=await model.detect(det,20,S.conf);}catch(e){}
      const want=COCO_CLASS();
      S.dets=preds.filter(p=>p.class===want).map(p=>{
        const sx=CW/DETW,sy=CH/DETH,w=p.bbox[2]*sx,h=p.bbox[3]*sy;
        return {x:p.bbox[0]*sx+w/2,y:p.bbox[1]*sy+h/2,w,h,score:p.score};
      });
      associate(performance.now());
    }else await new Promise(r=>setTimeout(r,60));
  }
}
function associate(t){
  if(!S.target)return;
  let best=null,bd=1e9;const gate=0.28*CW;
  for(const d of S.dets){
    const dist=Math.hypot(d.x-S.target.x,d.y-S.target.y),sr=Math.max(d.w/S.target.w,S.target.w/d.w);
    if(dist<gate&&sr<2.4&&dist<bd){bd=dist;best=d;}
  }
  if(best){
    S.lost=0;S.searching=false;
    const prev={x:S.target.x,y:S.target.y},k=0.5;
    S.target={x:S.target.x+(best.x-S.target.x)*k,y:S.target.y+(best.y-S.target.y)*k,w:best.w,h:best.h};
    measure(t,prev,S.target);
  }else{if(++S.lost>14)S.searching=true;}
}

function measure(t,prev,cur){
  if(S.lastT){
    const dt=(t-S.lastT)/1000;
    if(dt>0&&dt<1&&S.ppm){
      const m=Math.hypot(cur.x-prev.x,cur.y-prev.y)/S.ppm,v=m/dt;
      S.smoothV=S.smoothV*0.65+v*0.35;
      if(v>0.05){S.distM+=m;if(S.recording)S.playDist+=m;}
      if(S.smoothV>S.maxV)S.maxV=S.smoothV;
      if(S.recording&&S.smoothV>S.peakV)S.peakV=S.smoothV;
    }
  }
  S.lastT=t;if(!S.startT)S.startT=t;
  S.trail.push({x:cur.x,y:cur.y,t});if(S.trail.length>260)S.trail.shift();
  const hx=Math.min(S.HX-1,Math.max(0,(cur.x/CW*S.HX)|0)),hy=Math.min(S.HY-1,Math.max(0,(cur.y/CH*S.HY)|0));
  if(S.heat)S.heat[hy*S.HX+hx]+=1;
  updateHUD(t);
}
const conv=v=>S.unit==='kmh'?v*3.6:S.unit==='mph'?v*2.23694:v;
function updateHUD(t){
  spd.textContent=conv(S.smoothV).toFixed(1);peak.textContent=conv(S.peakV).toFixed(1);
  mx.textContent=conv(S.maxV).toFixed(1);
  dist.textContent=S.distM<10?S.distM.toFixed(1):Math.round(S.distM);
  clk.textContent=((t-(S.startT||t))/1000).toFixed(1);
}

function loop(){
  if(!S.running)return;
  if(video.readyState>=2)ctx.drawImage(video,cover.dx,cover.dy,cover.dw,cover.dh);
  if(S.showHeat)drawHeat();
  if(S.showTrail)drawTrail();
  if(S.calStage>0)drawCal();else{drawCandidates();drawTarget();}
  requestAnimationFrame(loop);
}
function drawCandidates(){
  if(S.target)return;
  ctx.save();ctx.lineWidth=1.5*DPR;ctx.strokeStyle='rgba(232,240,242,.35)';ctx.setLineDash([6*DPR,5*DPR]);
  for(const d of S.dets)ctx.strokeRect(d.x-d.w/2,d.y-d.h/2,d.w,d.h);
  ctx.restore();
}
function drawTarget(){
  if(!S.target)return;
  const {x,y,w,h}=S.target,col=S.searching?'#ff5d4a':(S.mode==='ball'?'#19e0ff':'#c8ff32');
  ctx.save();ctx.strokeStyle=col;ctx.lineWidth=2.5*DPR;ctx.globalAlpha=S.searching?.6:1;
  const bx=x-w/2,by=y-h/2,c=Math.min(w,h)*0.28;
  [[bx,by,1,1],[bx+w,by,-1,1],[bx,by+h,1,-1],[bx+w,by+h,-1,-1]].forEach(([px,py,sx,sy])=>{
    ctx.beginPath();ctx.moveTo(px,py+sy*c);ctx.lineTo(px,py);ctx.lineTo(px+sx*c,py);ctx.stroke();
  });
  ctx.beginPath();ctx.arc(x,y,3.5*DPR,0,7);ctx.fillStyle=col;ctx.fill();
  ctx.globalAlpha=1;ctx.font=`700 ${13*DPR}px ui-monospace,Menlo,monospace`;
  const lab=S.searching?'SEARCHING':conv(S.smoothV).toFixed(1)+' '+S.unit.toUpperCase();
  const tw=ctx.measureText(lab).width+14*DPR;
  ctx.fillStyle='rgba(7,9,12,.8)';ctx.fillRect(bx,by-22*DPR,tw,20*DPR);
  ctx.fillStyle=col;ctx.fillText(lab,bx+7*DPR,by-7*DPR);
  ctx.restore();
}
function drawTrail(){
  if(S.trail.length<2)return;
  ctx.save();ctx.lineWidth=3*DPR;ctx.lineCap='round';ctx.lineJoin='round';
  for(let i=1;i<S.trail.length;i++){
    const a=S.trail[i-1],b=S.trail[i],f=i/S.trail.length;
    ctx.strokeStyle=`rgba(200,255,50,${0.08+f*0.55})`;
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
  }
  ctx.restore();
}
function drawHeat(){
  if(!S.heat)return;let mxv=0;for(const v of S.heat)if(v>mxv)mxv=v;if(mxv<1)return;
  const cw=CW/S.HX,ch=CH/S.HY;ctx.save();ctx.globalAlpha=0.5;
  for(let j=0;j<S.HY;j++)for(let i=0;i<S.HX;i++){
    const v=S.heat[j*S.HX+i]/mxv;if(v<0.04)continue;
    const r=Math.min(255,60+v*195),g=Math.max(0,200-v*200);
    ctx.fillStyle=`rgba(${r|0},${g|0},40,${0.15+v*0.6})`;ctx.fillRect(i*cw,j*ch,cw+1,ch+1);
  }
  ctx.restore();
}
function drawCal(){
  ctx.save();ctx.strokeStyle='#19e0ff';ctx.fillStyle='#19e0ff';ctx.lineWidth=2.5*DPR;
  S.calPts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,6*DPR,0,7);ctx.fill();});
  if(S.calPts.length===2){ctx.beginPath();ctx.moveTo(S.calPts[0].x,S.calPts[0].y);ctx.lineTo(S.calPts[1].x,S.calPts[1].y);ctx.stroke();}
  ctx.restore();
}

cv.addEventListener('pointerdown',e=>{
  if(!S.running)return;
  const r=cv.getBoundingClientRect(),x=(e.clientX-r.left)*DPR,y=(e.clientY-r.top)*DPR;
  if(S.calStage>0){calTap(x,y);return;}
  let pick=null,bd=1e9;
  for(const d of S.dets){
    const inside=Math.abs(x-d.x)<d.w/2&&Math.abs(y-d.y)<d.h/2,dist=Math.hypot(x-d.x,y-d.y);
    if(inside){pick=d;break;}if(dist<bd){bd=dist;pick=d;}
  }
  if(pick&&bd<0.3*CW)S.target={x:pick.x,y:pick.y,w:pick.w,h:pick.h};
  else S.target={x,y,w:0.12*CW,h:0.26*CH};
  S.lost=0;S.searching=false;S.lastT=0;S.startT=0;
  setMode('LIVE');flash('Locked'+(S.ppm?'':' — tap <span class="k">Set Scale</span> for real speed'),1800);
});

document.getElementById('bCal').onclick=function(){
  if(!S.running){flash('Start first',1200);return;}
  S.calStage=1;S.calPts=[];this.classList.add('on');
  flash('Tap two points a <span class="k">known distance</span> apart\n(court width, penalty box, a 5 m line)',3000);
};
function calTap(x,y){
  S.calPts.push({x,y});
  if(S.calPts.length===2){
    const dpx=Math.hypot(S.calPts[1].x-S.calPts[0].x,S.calPts[1].y-S.calPts[0].y);
    setTimeout(()=>{
      const m=parseFloat(prompt('Distance between the two points, in meters?','5'));
      if(m>0){S.ppm=dpx/m;flash('Scale set · '+(dpx/m).toFixed(0)+' px/m',1800);}else flash('Cancelled',1200);
      S.calStage=0;S.calPts=[];document.getElementById('bCal').classList.remove('on');
    },40);
  }else flash('Now tap the <span class="k">2nd</span> point',1400);
}

document.getElementById('bRec').onclick=function(){
  if(!S.running)return;
  if(!S.recording){
    if(!S.ppm)flash('Set scale first for real speeds',1600);
    S.recording=true;S.peakV=0;S.playDist=0;S.playStart=performance.now();
    this.classList.add('on');this.textContent='■ Stop';document.getElementById('recTag').style.display='block';
  }else{
    S.recording=false;this.classList.remove('on');this.textContent='● Rec Play';
    document.getElementById('recTag').style.display='none';
    const dur=(performance.now()-S.playStart)/1000;
    if(dur>0.5){
      S.plays.unshift({peak:S.peakV,dist:S.playDist,dur,ts:Date.now()});
      savePlays();renderPlays();
      flash('Play saved · peak '+conv(S.peakV).toFixed(1)+' '+S.unit.toUpperCase(),2000);
    }
  }
};
function renderPlays(){
  const el=document.getElementById('playList');
  if(!S.plays.length){el.className='empty';el.textContent='No plays yet';return;}
  el.className='';
  el.innerHTML=S.plays.slice(0,8).map((p,i)=>`<div class="pl">#${S.plays.length-i} &nbsp;<b>${conv(p.peak).toFixed(1)}</b> ${S.unit}<br><span>${p.dist.toFixed(1)} m</span> · ${p.dur.toFixed(1)} s · avg ${conv(p.dist/p.dur).toFixed(1)}</div>`).join('');
}

function setMode(t){const e=document.getElementById('modeTag');e.textContent=t;e.classList.toggle('live',t==='LIVE');}
function pickMode(m){
  S.mode=m;S.target=null;S.searching=false;S.dets=[];
  mPlayer.classList.toggle('on',m==='player');mBall.classList.toggle('on',m==='ball');
  if(S.running){setMode('STANDBY');flash('Tap the <span class="k">'+(m==='ball'?'ball':'player')+'</span> to lock on',1800);}
}
const mPlayer=document.getElementById('mPlayer'),mBall=document.getElementById('mBall');
mPlayer.onclick=()=>pickMode('player');mBall.onclick=()=>pickMode('ball');
document.getElementById('bTrail').onclick=function(){S.showTrail=!S.showTrail;this.classList.toggle('on',S.showTrail);};
document.getElementById('bHeat').onclick=function(){S.showHeat=!S.showHeat;this.classList.toggle('on',S.showHeat);};
document.getElementById('bLog').onclick=function(){document.getElementById('playsPanel').classList.toggle('show');this.classList.toggle('on');};
document.getElementById('bUnit').onclick=function(){
  S.unit=S.unit==='kmh'?'mph':S.unit==='mph'?'ms':'kmh';
  const l={kmh:'KM/H',mph:'MPH',ms:'M/S'}[S.unit];
  this.textContent=l;document.getElementById('spdUnit').textContent=l;renderPlays();
};
document.getElementById('bReset').onclick=()=>{
  S.target=null;S.searching=false;S.maxV=0;S.distM=0;S.smoothV=0;S.peakV=0;S.lastT=0;S.startT=0;
  S.trail=[];if(S.heat)S.heat.fill(0);
  setMode('STANDBY');spd.textContent='0.0';peak.textContent='0.0';mx.textContent='0.0';dist.textContent='0';clk.textContent='0.0';
  flash('Reset',1000);
};
document.getElementById('sens').oninput=e=>{S.conf=e.target.value/100;};

let ht;function flash(m,ms=1800){const h=document.getElementById('hint');h.innerHTML=m.replace(/\n/g,'<br>');h.classList.add('show');clearTimeout(ht);ht=setTimeout(()=>h.classList.remove('show'),ms);}
const spd=document.getElementById('spd'),peak=document.getElementById('peak'),mx=document.getElementById('mx'),dist=document.getElementById('dist'),clk=document.getElementById('clk');
</script>
</body>
</html>
